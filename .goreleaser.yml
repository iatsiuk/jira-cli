version: 2
project_name: jira

release:
  prerelease: auto
  name_template: "{{.Tag}}"
  draft: false
  mode: "replace"

builds:
  - main: ./cmd/jira
    binary: jira
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/ankitpokhrel/jira-cli/internal/version.Version={{.Version}}
      - -X github.com/ankitpokhrel/jira-cli/internal/version.GitCommit={{.FullCommit}}
      - -X github.com/ankitpokhrel/jira-cli/internal/version.SourceDateEpoch={{.CommitTimestamp}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: jira
    repository:
      owner: iatsiuk
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/iatsiuk/jira-cli"
    description: "Interactive command-line tool for Jira"
    hooks:
      post:
        install: |
          system_command "/bin/sh", args: ["-c", "xattr -d com.apple.quarantine '#{staged_path}/jira' 2>/dev/null; true"]
    caveats: |
      Quarantine attribute (com.apple.quarantine) is automatically removed
      from the jira binary during installation to prevent Gatekeeper warnings.
      See: https://github.com/Homebrew/brew/issues/20755

      To uninstall:
        brew uninstall --cask iatsiuk/tap/jira

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
